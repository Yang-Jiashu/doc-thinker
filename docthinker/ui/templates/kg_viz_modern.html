{% extends "base_modern.html" %}

{% block title %}知识图谱 - NeuroAgent{% endblock %}

{% block extra_css %}
<style>
    .node circle { cursor: pointer; transition: all 0.2s; }
    .node:hover circle { filter: brightness(1.2); stroke-width: 3; }
    .node-label-inside { pointer-events: none; fill: #fff; font-weight: 600; }
    .hop-badge { pointer-events: none; font-weight: 700; fill: #fff; }
    .link { stroke: #cbd5e1; stroke-opacity: 0.4; pointer-events: none; }
    .link-hit { stroke: transparent; stroke-width: 20; pointer-events: stroke; cursor: pointer; fill: none; }
    .level-3 { fill: #ec4899; }
    .level-2 { fill: #3b82f6; }
    .level-1 { fill: #10b981; }
    .level-expanded { fill: #fbbf24; }
    .level-image { fill: #8b5cf6; }
    .dimmed { opacity: 0.08 !important; }
    .highlighted circle { stroke: #f59e0b; stroke-width: 3; }
    .detail-section { border-left: 3px solid #e2e8f0; padding-left: 12px; margin-bottom: 12px; }
    .detail-section.edge-detail { border-left-color: #3b82f6; }
    .detail-section.node-detail { border-left-color: #10b981; }
    .relation-list-item { padding: 6px 8px; border-radius: 6px; background: #f8fafc; margin-bottom: 4px; font-size: 13px; }
    .relation-list-item:hover { background: #eff6ff; }
    .img-thumb { max-width: 100%; max-height: 160px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; object-fit: contain; background: #f8fafc; }
    .img-thumb:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .lightbox { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); object-fit: contain; }
    .lightbox-close { position: absolute; top: 16px; right: 24px; color: #fff; font-size: 28px; cursor: pointer; background: rgba(0,0,0,0.4); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }
</style>
{% endblock %}

{% block content %}
<script>window.KG_API_PREFIX = '{{ (api_config.api_prefix if api_config else none)|default("/api/v1") }}';</script>
<header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
    <div>
        <h2 class="text-lg font-semibold text-slate-800">知识图谱</h2>
        <p class="text-sm text-slate-500">可视化展示知识关联与层次结构
            <span id="data-source-hint" class="text-amber-600 font-medium"></span>
        </p>
    </div>
    <div class="flex gap-2 items-center">
        <select id="kg-session-selector" class="input-field px-3 py-2 rounded-lg text-sm min-w-[260px]" onchange="handleKgSessionSwitch(this.value)"></select>
        <button id="expand-btn" onclick="expandGraph()" class="px-4 py-2 rounded-lg text-sm font-medium bg-amber-400 hover:bg-amber-500 text-slate-800" title="LLM 多角度联想扩展节点">扩展</button>
        <button onclick="resetHighlight()" class="btn-secondary px-4 py-2 rounded-lg text-sm" title="取消聚焦，显示全部节点">取消聚焦</button>
        <button onclick="resetZoom()" class="btn-secondary px-4 py-2 rounded-lg text-sm">重置视图</button>
        <button onclick="refreshGraph()" class="btn-primary px-4 py-2 rounded-lg text-sm">刷新</button>
    </div>
</header>

<div class="flex-1 flex overflow-hidden">
    <div class="flex-1 relative bg-slate-50">
        <div id="graph-container" class="absolute inset-0"></div>
        
        <div class="absolute top-4 left-4 space-y-3">
            <div class="card p-3">
                <input type="text" id="search-input" placeholder="搜索节点（模糊匹配）..." 
                    class="input-field px-3 py-2 rounded-lg text-sm w-48"
                    oninput="searchNodes(this.value)">
            </div>
            
            <div class="card p-3">
                <p class="text-xs font-semibold text-slate-500 mb-2">层级筛选</p>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(3)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-pink-500"></span>
                        <span class="text-slate-600">Domain</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(2)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        <span class="text-slate-600">Concept</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(1)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <span class="text-slate-600">Instance</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer mt-2 pt-2 border-t border-slate-200">
                        <input type="checkbox" checked onchange="toggleExpanded()" class="rounded" id="chk-expanded">
                        <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:#FFD700"></span>
                        <span class="text-slate-600">扩展节点</span>
                    </label>
                </div>
            </div>
            <div class="card p-3">
                <p class="text-xs font-semibold text-slate-500 mb-2">调试</p>
                <button onclick="checkExpandedNodes()" class="px-3 py-1.5 rounded text-xs bg-slate-100 hover:bg-slate-200 text-slate-600">检查扩展节点 (API)</button>
                <p id="debug-result" class="text-xs text-slate-500 mt-2 break-all"></p>
            </div>
        </div>
    </div>
    
    <!-- Detail Panel -->
    <div id="detail-panel" class="hidden w-96 bg-white border-l border-slate-200 overflow-y-auto">
        <div class="p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 id="detail-title" class="font-semibold text-slate-800 text-base">详情</h3>
                <button onclick="closePanel()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let svg, g, simulation, nodeGroup, linkGroup;
let currentTransform = d3.zoomIdentity;
let graphData = { nodes: [], links: [] };
let selectedNode = null;
let visibleLevels = { 1: true, 2: true, 3: true, expanded: true };
let currentSessionId = '';
let focusedNodeId = null;

window.onload = initGraph;

function getKgApiPrefix() {
    return (window.KG_API_PREFIX || '/api/v1').replace(/\/$/, '');
}
function getStoredSessionId() { try { return localStorage.getItem('current_session_id') || ''; } catch (_) { return ''; } }
function setStoredSessionId(sid) { try { if (sid) localStorage.setItem('current_session_id', String(sid)); } catch (_) {} }

async function fetchSessions() {
    try {
        const resp = await fetch(getKgApiPrefix() + '/sessions');
        const data = await resp.json();
        if (resp.ok && Array.isArray(data.sessions)) return data.sessions;
    } catch (e) { console.warn('Fetch sessions failed:', e); }
    return [];
}

function renderSessionSelector(sessions, selectedId) {
    const selector = document.getElementById('kg-session-selector');
    if (!selector) return;
    selector.innerHTML = '';
    sessions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = String(s.id);
        opt.textContent = `${s.id} | ${s.title || '新对话'}`;
        selector.appendChild(opt);
    });
    if (sessions.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '暂无会话';
        selector.appendChild(opt);
    }
    selector.value = (selectedId && sessions.find(s => String(s.id) === String(selectedId)))
        ? String(selectedId) : (sessions.length ? String(sessions[0].id) : '');
}

async function ensureKgSessionReady() {
    const sessions = await fetchSessions();
    if (!sessions.length) { currentSessionId = ''; renderSessionSelector([], ''); return; }
    let tid = getStoredSessionId();
    if (!tid || !sessions.find(s => String(s.id) === String(tid))) tid = String(sessions[0].id);
    currentSessionId = String(tid);
    setStoredSessionId(currentSessionId);
    renderSessionSelector(sessions, currentSessionId);
}

async function handleKgSessionSwitch(sid) {
    sid = sid ? String(sid) : '';
    if (!sid || sid === currentSessionId) return;
    currentSessionId = sid;
    setStoredSessionId(currentSessionId);
    focusedNodeId = null;
    await loadRealData();
}

async function initGraph() {
    const container = document.getElementById('graph-container');
    const w = container.clientWidth, h = container.clientHeight;
    svg = d3.select('#graph-container').append('svg').attr('width', w).attr('height', h);
    const zoom = d3.zoom().scaleExtent([0.05, 6]).on('zoom', e => { currentTransform = e.transform; g.attr('transform', e.transform); });
    svg.call(zoom);
    svg.on('click', function(e) { if (e.target === this || e.target.tagName === 'svg') resetHighlight(); });
    g = svg.append('g');
    await ensureKgSessionReady();
    await loadRealData();
    window.addEventListener('resize', () => { svg.attr('width', container.clientWidth).attr('height', container.clientHeight); });
}

async function loadRealData() {
    if (!currentSessionId) {
        document.getElementById('data-source-hint').textContent = ' | 请先创建或选择会话';
        graphData = { nodes: [], links: [] };
        renderGraph();
        return;
    }
    try {
        const url = getKgApiPrefix() + '/knowledge-graph/data?session_id=' + encodeURIComponent(currentSessionId);
        const resp = await fetch(url);
        const text = await resp.text();
        let data;
        try { data = JSON.parse(text); } catch (pe) { throw new Error('JSON parse failed: ' + pe.message); }

        const meta = data.metadata || {};
        if (!resp.ok || meta.error || meta.hint) {
            document.getElementById('data-source-hint').textContent = ` | 会话 ${currentSessionId} | ` + (meta.hint || meta.error || ('HTTP ' + resp.status));
            graphData = { nodes: [], links: [] }; renderGraph(); return;
        }

        const expandedCount = (data.nodes || []).filter(n => n.is_expanded).length;
        const totalNodes = meta.total_nodes ?? (data.nodes?.length || 0);
        let hint = ` | 会话 ${currentSessionId} | ${totalNodes} 节点`;
        if (meta.nodes_returned && meta.nodes_returned !== totalNodes) hint += ` (显示${meta.nodes_returned})`;
        hint += `, ${expandedCount} 扩展`;
        document.getElementById('data-source-hint').textContent = hint;

        if (data.nodes && data.nodes.length > 0) {
            const levelMap = { 'field': 3, 'domain': 3, 'concept': 2, 'method': 2, 'artifact': 1, 'data': 1, 'person': 1, 'event': 1, 'location': 1, 'organization': 1, 'content': 1, 'naturalobject': 1, 'image': 2, 'image_asset': 2, 'figure': 2, 'diagram': 2 };
            graphData = {
                nodes: data.nodes.map(n => ({
                    id: n.id,
                    name: n.label || n.id,
                    level: levelMap[n.type] || 2,
                    type: n.type,
                    connections: [],
                    is_expanded: !!n.is_expanded,
                    is_image_node: !!n.is_image_node,
                    has_image: !!n.has_image,
                    image_file: n.image_file || '',
                    color: n.color
                })),
                links: (data.edges || []).map(e => ({
                    source: e.source,
                    target: e.target,
                    label: e.label || '',
                    description: e.description || e.label || ''
                }))
            };
            const nodeIds = new Set(graphData.nodes.map(n => n.id));
            graphData.nodes.forEach(n => {
                n.connections = graphData.links
                    .filter(l => l.source === n.id || l.target === n.id)
                    .map(l => l.source === n.id ? l.target : l.source)
                    .filter(id => nodeIds.has(id));
            });
            renderGraph();
            return;
        }
        document.getElementById('data-source-hint').textContent = ` | 会话 ${currentSessionId} | 暂无节点`;
        graphData = { nodes: [], links: [] }; renderGraph();
    } catch (e) {
        console.warn('Failed to load real data:', e);
        document.getElementById('data-source-hint').textContent = ` | 加载失败: ` + (e.message || e);
        graphData = { nodes: [], links: [] }; renderGraph();
    }
}

function truncText(text, maxLen) {
    if (!text) return '';
    return text.length > maxLen ? text.substring(0, maxLen) + '..' : text;
}

function nodeRadius(d) { return 14 + d.level * 4; }

function renderGraph() {
    g.selectAll('*').remove();
    focusedNodeId = null;

    const isExp = n => !!n.is_expanded;
    const visibleNodes = graphData.nodes.filter(n => isExp(n) ? !!visibleLevels.expanded : !!visibleLevels[n.level]);
    const visibleNodeIds = new Set(visibleNodes.map(n => n.id));
    const visibleLinks = graphData.links.filter(l =>
        visibleNodeIds.has(typeof l.source === 'object' ? l.source.id : l.source) &&
        visibleNodeIds.has(typeof l.target === 'object' ? l.target.id : l.target)
    );

    const container = document.getElementById('graph-container');
    const w = container.clientWidth, h = container.clientHeight;

    const panelW = 400;
    const effectiveW = w - panelW;
    simulation = d3.forceSimulation(visibleNodes)
        .force('link', d3.forceLink(visibleLinks).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-500).distanceMax(350))
        .force('center', d3.forceCenter(effectiveW / 2, h / 2))
        .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 10))
        .alphaMin(0.02);

    linkGroup = g.append('g').attr('class', 'links');
    const linkSel = linkGroup.selectAll('.link').data(visibleLinks)
        .enter().append('line').attr('class', 'link');

    const hitGroup = g.append('g').attr('class', 'link-hits');
    const linkHitSel = hitGroup.selectAll('.link-hit').data(visibleLinks)
        .enter().append('line').attr('class', 'link-hit')
        .on('click', (e, d) => { e.stopPropagation(); selectEdge(d); })
        .on('mouseenter', function() { d3.select(this).attr('stroke', 'rgba(59,130,246,0.25)'); })
        .on('mouseleave', function() { d3.select(this).attr('stroke', 'transparent'); });

    nodeGroup = g.append('g').attr('class', 'nodes');
    const nodeSel = nodeGroup.selectAll('g').data(visibleNodes)
        .enter().append('g').attr('class', 'node')
        .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended))
        .on('click', (e, d) => { e.stopPropagation(); selectNode(d); });

    nodeSel.append('circle')
        .attr('r', d => nodeRadius(d))
        .attr('class', d => {
            if (isExp(d)) return 'level-expanded';
            if (d.is_image_node) return 'level-image';
            return `level-${d.level}`;
        })
        .attr('fill', d => isExp(d) ? '#FFD700' : null)
        .attr('stroke', d => isExp(d) ? '#B8860B' : (d.is_image_node ? '#6d28d9' : '#fff'))
        .attr('stroke-width', d => isExp(d) ? 2 : (d.is_image_node ? 2 : 1.5));

    nodeSel.append('text')
        .attr('class', 'node-label-inside')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('font-size', d => Math.max(7, Math.min(10, nodeRadius(d) * 0.7)))
        .text(d => truncText(d.name, 4));

    const pad = 30;

    simulation.on('tick', () => {
        visibleNodes.forEach(d => {
            const r = nodeRadius(d);
            const maxX = w - panelW - pad - r;
            d.x = Math.max(pad + r, Math.min(maxX, d.x));
            d.y = Math.max(pad + r, Math.min(h - pad - r, d.y));
        });

        linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        linkHitSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

/* ───────── BFS hop-level calculation ───────── */
function computeHopLevels(startId, maxHops) {
    const levels = {};
    levels[startId] = 0;
    let frontier = [startId];
    for (let hop = 1; hop <= maxHops; hop++) {
        const nextFrontier = [];
        for (const nid of frontier) {
            const nd = graphData.nodes.find(n => n.id === nid);
            if (!nd) continue;
            for (const cid of (nd.connections || [])) {
                if (!(cid in levels)) {
                    levels[cid] = hop;
                    nextFrontier.push(cid);
                }
            }
        }
        frontier = nextFrontier;
        if (!frontier.length) break;
    }
    return levels;
}

/* ───────── Node click: focus + hop levels ───────── */
function selectNode(d) {
    selectedNode = d;
    focusedNodeId = d.id;

    const hopLevels = computeHopLevels(d.id, 3);
    const connectedIds = new Set(Object.keys(hopLevels));

    nodeGroup.selectAll('.node')
        .classed('dimmed', n => !connectedIds.has(n.id))
        .classed('highlighted', n => n.id === d.id);

    linkGroup.selectAll('.link')
        .classed('dimmed', l => {
            const sid = typeof l.source === 'object' ? l.source.id : l.source;
            const tid = typeof l.target === 'object' ? l.target.id : l.target;
            return !connectedIds.has(sid) || !connectedIds.has(tid);
        });

    nodeGroup.selectAll('.hop-badge').remove();
    nodeGroup.selectAll('.node').each(function(n) {
        const hop = hopLevels[n.id];
        if (hop && hop >= 1 && hop <= 3) {
            d3.select(this).append('text')
                .attr('class', 'hop-badge')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('dx', nodeRadius(n) + 8)
                .attr('dy', -nodeRadius(n) + 4)
                .attr('font-size', 11)
                .attr('fill', ['', '#f59e0b', '#3b82f6', '#8b5cf6'][hop])
                .text(hop);
        }
    });

    showNodeDetail(d, hopLevels);
}

/* ───────── Edge click ───────── */
function selectEdge(d) {
    const panel = document.getElementById('detail-panel');
    panel.classList.remove('hidden');
    document.getElementById('detail-title').textContent = '关系详情';

    const srcName = typeof d.source === 'object' ? d.source.name || d.source.id : d.source;
    const tgtName = typeof d.target === 'object' ? d.target.name || d.target.id : d.target;

    document.getElementById('detail-content').innerHTML = `
        <div class="detail-section edge-detail">
            <p class="text-xs text-slate-500 mb-1">源节点</p>
            <p class="text-sm font-medium text-slate-800">${srcName}</p>
        </div>
        <div class="detail-section edge-detail">
            <p class="text-xs text-slate-500 mb-1">目标节点</p>
            <p class="text-sm font-medium text-slate-800">${tgtName}</p>
        </div>
        <div class="detail-section edge-detail">
            <p class="text-xs text-slate-500 mb-1">关系类型</p>
            <p class="text-sm font-semibold text-blue-700">${d.label || 'related'}</p>
        </div>
        <div class="detail-section edge-detail">
            <p class="text-xs text-slate-500 mb-1">关系描述</p>
            <p class="text-sm text-slate-700">${d.description || d.label || '无详细描述'}</p>
        </div>
    `;
}

/* ───────── Node detail panel ───────── */
function showNodeDetail(d, hopLevels) {
    const panel = document.getElementById('detail-panel');
    panel.classList.remove('hidden');
    document.getElementById('detail-title').textContent = d.name;

    const isExp = !!d.is_expanded;
    const levelName = isExp ? 'LLM 扩展' : (d.is_image_node ? '图片节点' : ['Instance', 'Concept', 'Domain'][d.level - 1]);

    const connEdges = graphData.links.filter(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return sid === d.id || tid === d.id;
    });

    let relHtml = connEdges.map(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        const other = sid === d.id ? tid : sid;
        const hop = hopLevels[other] || '?';
        return `<div class="relation-list-item">
            <span class="text-blue-600 font-medium">${l.label || 'related'}</span>
            <span class="text-slate-400 mx-1">→</span>
            <span class="text-slate-700">${other}</span>
            <span class="text-xs text-slate-400 ml-1">(${hop}级)</span>
        </div>`;
    }).join('');
    if (!relHtml) relHtml = '<p class="text-sm text-slate-400">无连接关系</p>';

    let imageHtml = '';
    if (d.is_image_node && d.has_image && d.image_file) {
        const imgUrl = getKgApiPrefix() + '/knowledge-graph/image/' + encodeURIComponent(currentSessionId) + '/' + encodeURIComponent(d.image_file);
        imageHtml = `
            <div class="mb-4 p-3 bg-slate-50 rounded-lg text-center">
                <p class="text-xs font-semibold text-slate-500 mb-2">图片预览</p>
                <img src="${imgUrl}" class="img-thumb" onclick="openLightbox('${imgUrl}')" alt="图片节点"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <p class="text-xs text-slate-400" style="display:none">图片加载失败</p>
            </div>`;
    } else if (d.is_image_node && !d.has_image) {
        imageHtml = `
            <div class="mb-4 p-3 bg-purple-50 rounded-lg text-center">
                <p class="text-xs text-purple-400"><i class="fa-solid fa-image mr-1"></i>图片引用节点（无存储图片）</p>
            </div>`;
    }

    document.getElementById('detail-content').innerHTML = `
        ${imageHtml}
        <div class="space-y-3 mb-4">
            <div class="flex justify-between p-3 bg-slate-50 rounded-lg">
                <span class="text-sm text-slate-500">类型</span>
                <span class="text-sm font-medium">${d.type || 'unknown'}</span>
            </div>
            <div class="flex justify-between p-3 bg-slate-50 rounded-lg">
                <span class="text-sm text-slate-500">层级</span>
                <span class="text-sm font-medium">${levelName}</span>
            </div>
            <div class="flex justify-between p-3 bg-slate-50 rounded-lg">
                <span class="text-sm text-slate-500">连接数</span>
                <span class="text-sm font-medium text-blue-600">${d.connections ? d.connections.length : 0}</span>
            </div>
        </div>
        <p class="text-xs font-semibold text-slate-500 mb-2">关联关系</p>
        <div class="space-y-1">${relHtml}</div>
        <button onclick="focusNode()" class="btn-primary w-full mt-4 py-2 rounded-lg text-sm">聚焦视图</button>
    `;
}

/* ───────── Reset highlight ───────── */
function resetHighlight() {
    focusedNodeId = null;
    nodeGroup.selectAll('.node').classed('dimmed', false).classed('highlighted', false);
    linkGroup.selectAll('.link').classed('dimmed', false);
    nodeGroup.selectAll('.hop-badge').remove();
    closePanel();
}

function closePanel() {
    document.getElementById('detail-panel').classList.add('hidden');
}

function openLightbox(imgUrl) {
    const existing = document.querySelector('.lightbox');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.className = 'lightbox';
    overlay.innerHTML = `<span class="lightbox-close">&times;</span><img src="${imgUrl}" alt="图片">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        const lb = document.querySelector('.lightbox');
        if (lb) lb.remove();
    }
});

function focusNode() {
    if (!selectedNode) return;
    const container = document.getElementById('graph-container');
    svg.transition().duration(750).call(
        d3.zoom().transform,
        d3.zoomIdentity.translate(container.clientWidth / 2, container.clientHeight / 2).scale(1.5)
            .translate(-selectedNode.x, -selectedNode.y)
    );
}

function toggleLevel(level) { visibleLevels[level] = !visibleLevels[level]; renderGraph(); }
function toggleExpanded() { visibleLevels.expanded = !visibleLevels.expanded; renderGraph(); }

/* ───────── Fuzzy search (soft match) ───────── */
function fuzzyScore(query, target) {
    if (!query || !target) return 0;
    const q = query.toLowerCase(), t = target.toLowerCase();
    if (t.includes(q)) return 1.0;
    if (t.startsWith(q[0])) {
        let matched = 0;
        let ti = 0;
        for (let qi = 0; qi < q.length && ti < t.length; qi++) {
            while (ti < t.length) {
                if (t[ti] === q[qi]) { matched++; ti++; break; }
                ti++;
            }
        }
        return matched / q.length;
    }
    let matched = 0;
    for (const ch of q) { if (t.includes(ch)) matched++; }
    return matched / q.length * 0.5;
}

function searchNodes(query) {
    if (!query || !query.trim()) {
        nodeGroup.selectAll('.node').classed('dimmed', false);
        linkGroup.selectAll('.link').classed('dimmed', false);
        return;
    }
    const threshold = 0.5;
    const scores = {};
    graphData.nodes.forEach(n => { scores[n.id] = fuzzyScore(query, n.name); });

    const matchedIds = new Set(Object.keys(scores).filter(id => scores[id] >= threshold));

    nodeGroup.selectAll('.node').classed('dimmed', d => !matchedIds.has(d.id));
    linkGroup.selectAll('.link').classed('dimmed', l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return !matchedIds.has(sid) && !matchedIds.has(tid);
    });
}

function resetZoom() {
    svg.transition().duration(750).call(d3.zoom().transform, d3.zoomIdentity);
}

function refreshGraph() {
    loadRealData();
    showToast('知识图谱已刷新', 'success');
}

async function checkExpandedNodes() {
    const el = document.getElementById('debug-result');
    if (!currentSessionId) { el.textContent = '请先选择会话'; return; }
    el.textContent = '检查中...';
    try {
        const url = getKgApiPrefix() + '/knowledge-graph/debug-expanded?session_id=' + encodeURIComponent(currentSessionId);
        const resp = await fetch(url);
        const data = await resp.json().catch(() => ({}));
        if (data.expanded_count !== undefined) {
            el.textContent = `总节点: ${data.total_nodes || 0}, 扩展: ${data.expanded_count}`;
        } else {
            el.textContent = data.detail || data.error || ('HTTP ' + resp.status) || '请求失败';
        }
    } catch (e) { el.textContent = '错误: ' + e.message; }
}

async function expandGraph() {
    const btn = document.getElementById('expand-btn');
    if (btn.disabled) return;
    if (!currentSessionId) { showToast('请先选择会话', 'warning'); return; }
    btn.disabled = true;
    btn.textContent = '扩展中...';
    try {
        const resp = await fetch(getKgApiPrefix() + '/knowledge-graph/expand', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: currentSessionId, apply: true, angle_indices: [0, 1, 5] })
        });
        const data = await resp.json().catch(() => ({}));
        if (data.success) {
            showToast('扩展完成，新增 ' + ((data.added || []).length) + ' 个节点', 'success');
            loadRealData();
        } else {
            showToast('扩展失败: ' + (data.detail || data.error || '未知错误'), 'error');
        }
    } catch (err) { showToast('扩展请求失败: ' + err.message, 'error'); }
    btn.disabled = false;
    btn.textContent = '扩展';
}

function dragstarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.15).restart();
    d.fx = d.x; d.fy = d.y;
}
function dragged(e, d) {
    d.fx = e.x; d.fy = e.y;
}
function dragended(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
}
</script>
